name: sqlserver-stack

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    hostname: sql
    restart: unless-stopped
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD:-Abcd@1234}"
      MSSQL_PID: "${SQLSERVER_PID:-Developer}"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q 'SELECT 1') >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

volumes:
  sqlserver-data:
    name: sqlserver-data
