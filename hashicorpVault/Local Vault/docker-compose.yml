name: vault-stack

services:
  vault:
    image: hashicorp/vault:1.19
    restart: unless-stopped
    ports:
      - "${VAULT_PORT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-local-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-local-root-token}
    command: server -dev
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
